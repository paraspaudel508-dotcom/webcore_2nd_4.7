<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iintoo layout</title>
    <link rel="stylesheet" href="style.css">
    <link href=" https://www.fontsquirrel.com/fonts/barlow" rel="stylesheet">
</head>


<body>
    <div class="main">
    <section class = "left-side"> 
        <div class = "logo">
            <img src="img/logo-icon.svg" alt="iintoo logo" width = "100" height="100">
        </div>

    </section>
   
  <section class = "right-side">
     <div class = "content">
        <h1>Get iintoo it today</h1>
        <p class="subtitle"> There is no charge or obligation upon registration.</p>
     </div>

        
        <div class="contact-row">
            <button class = "btn-fb">
                <img src="img/fb-icon.svg" alt="" class="icon">
                <span>Register with Facebook</span>
            </button>

            <button class = "btn-li">
                <img src="img/li-icon.svg" alt="" class="icon">
                <span>Register with LinkedIn</span>
            </button>
        </div>

        <p class="or"><span>OR</span></p>

        <form>
            <div class="input-row">
               <div class="input-group">
                    <label>Email</label>
                    <input type="email" value="gus.goodwin@gmail.com">
                </div>

                <div class="input-group">
                    <label>Phone</label>
                   <input type="tel">
                </div>
            </div>
             <p class="question">What type of investor are you?</p>
             <p class="sub-question">Select the type of investor you are below.</p>

            
                    <div class="selector-row">
                       <label class="select-container">
                            <input type="click" checked>
                            <span class="checkmark"></span> Individual <span class="info-icon">ⓘ</span>
                        </label>
                        <label class="select-container">
                            <input type="click">
                            <span class="checkmark"></span> Business <span class="info-icon">ⓘ</span>
                        </label>
                        <label class="select-container">
                            <input type="click">
                            <span class="checkmark"></span> IRA <span class="info-icon">ⓘ</span>
                        </label>
                        <label class="select-container">
                            <input type="click">
                            <span class="checkmark"></span> Trust <span class="info-icon">ⓘ</span>
                        </label>
                    </div>

                    <div class="helper-box">
                        I am a natural person investing on my own behalf as a sole owner, joint tenant, or tenant in common.
                    </div>

                    <div class="checkbox-row">
                        <input type="checkbox" id="terms">
                        <label for="terms">I agree to the terms and receiving notifications from iintoo <a href="#">View full terms</a></label>
                    </div>
                  <br>
                     <br>
                    <button type="submit" class="btn-submit">Create Account</button>
        
        </form>
    
    </section>
 </div>
</body>
